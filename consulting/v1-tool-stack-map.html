<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glytec AI SDR — V1 Tool Stack Map</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242836;
    --border: #2e3345;
    --text: #e2e4ed;
    --text-dim: #8b8fa3;
    --accent: #6366f1;
    --blue: #3b82f6;
    --green: #10b981;
    --red: #ef4444;
    --orange: #f97316;
    --purple: #a855f7;
    --pink: #ec4899;
    --yellow: #eab308;
    --cyan: #06b6d4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
  }

  /* ===== SIDEBAR ===== */
  .sidebar {
    width: 260px;
    min-width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  .sidebar-scroll {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
  }

  .sidebar-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--surface);
    z-index: 2;
  }

  .sidebar-header h1 { font-size: 14px; font-weight: 600; }
  .sidebar-header p { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

  .sidebar-section {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-section h3 {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text-dim);
    margin-bottom: 8px;
    font-weight: 600;
  }

  .preset-btn {
    display: block;
    width: 100%;
    padding: 6px 10px;
    margin-bottom: 3px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    font-size: 12px;
    cursor: pointer;
    text-align: left;
    transition: all 0.12s;
  }
  .preset-btn:hover { background: var(--surface2); }
  .preset-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .toggle-row {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 4px 0;
    cursor: pointer;
    font-size: 11px;
  }
  .toggle-row input[type="checkbox"] { accent-color: var(--accent); width: 13px; height: 13px; }
  .toggle-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* Notes section in sidebar */
  .notes-section {
    padding: 10px 16px 16px;
  }

  .notes-section h3 {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text-dim);
    margin-bottom: 8px;
    font-weight: 600;
  }

  .notes-empty {
    font-size: 11px;
    color: var(--text-dim);
    font-style: italic;
    padding: 6px 0;
  }

  .note-item {
    background: var(--surface2);
    border-radius: 5px;
    padding: 8px 10px;
    margin-bottom: 5px;
    font-size: 11px;
    position: relative;
  }
  .note-item .target { color: var(--accent); font-weight: 600; font-size: 10px; }
  .note-item .text { color: var(--text-dim); margin-top: 2px; line-height: 1.4; }
  .note-item .delete-btn {
    position: absolute; top: 5px; right: 7px;
    background: none; border: none; color: var(--text-dim);
    cursor: pointer; font-size: 13px; line-height: 1;
  }
  .note-item .delete-btn:hover { color: var(--red); }

  /* ===== MAIN ===== */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  .canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  svg#canvas { width: 100%; height: 100%; cursor: grab; }
  svg#canvas:active { cursor: grabbing; }

  /* Zoom controls */
  .zoom-controls {
    position: absolute;
    top: 12px;
    right: 12px;
    display: flex;
    gap: 3px;
    z-index: 5;
  }
  .zoom-btn {
    width: 30px; height: 30px;
    background: var(--surface); border: 1px solid var(--border); border-radius: 5px;
    color: var(--text); font-size: 15px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .zoom-btn:hover { background: var(--surface2); }

  /* Detail panel */
  .detail-panel {
    display: none;
    position: absolute;
    top: 12px; left: 12px;
    width: 360px;
    max-height: calc(100% - 24px);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow-y: auto;
    z-index: 10;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  }
  .detail-panel.open { display: block; }

  .detail-header {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    position: sticky; top: 0; background: var(--surface); z-index: 1;
  }
  .detail-header h2 { font-size: 13px; font-weight: 600; }
  .badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 500; margin-top: 4px; display: inline-block; }
  .detail-close {
    background: none; border: none; color: var(--text-dim);
    font-size: 18px; cursor: pointer; line-height: 1; padding: 0 0 0 10px;
  }

  .detail-body { padding: 12px 14px; font-size: 12px; line-height: 1.55; }
  .detail-body p { margin-bottom: 8px; color: var(--text-dim); }
  .detail-body h4 { font-size: 10px; text-transform: uppercase; letter-spacing: 0.4px; color: var(--text); margin: 12px 0 4px; font-weight: 600; }
  .detail-body ul { padding-left: 16px; color: var(--text-dim); }
  .detail-body li { margin-bottom: 2px; }
  .detail-body code { background: var(--bg); padding: 1px 5px; border-radius: 3px; font-size: 11px; font-family: 'SF Mono', Menlo, monospace; }

  .detail-note-area {
    padding: 10px 14px 14px;
    border-top: 1px solid var(--border);
  }
  .detail-note-area textarea {
    width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
    color: var(--text); font-size: 11px; font-family: inherit;
    padding: 7px; resize: vertical; min-height: 44px;
  }
  .detail-note-area textarea:focus { outline: none; border-color: var(--accent); }
  .detail-note-area button {
    margin-top: 5px; padding: 5px 14px;
    background: var(--accent); border: none; border-radius: 4px;
    color: #fff; font-size: 11px; cursor: pointer;
  }

  /* ===== PROMPT BAR (collapsible) ===== */
  .prompt-bar {
    background: var(--surface);
    border-top: 1px solid var(--border);
    transition: max-height 0.2s;
    overflow: hidden;
  }
  .prompt-bar.collapsed { max-height: 36px; }

  .prompt-bar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 16px;
    cursor: pointer;
    user-select: none;
  }
  .prompt-bar-header h3 {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--text-dim); font-weight: 600;
  }
  .prompt-bar-header .controls { display: flex; gap: 6px; align-items: center; }

  .prompt-toggle {
    background: none; border: none; color: var(--text-dim);
    font-size: 14px; cursor: pointer; padding: 0 4px; line-height: 1;
  }
  .prompt-toggle:hover { color: var(--text); }

  .copy-btn {
    padding: 3px 10px;
    background: var(--accent); border: none; border-radius: 4px;
    color: #fff; font-size: 10px; cursor: pointer;
  }
  .copy-btn.copied { background: var(--green); }

  .prompt-content {
    padding: 0 16px 12px;
    max-height: 140px;
    overflow-y: auto;
  }

  .prompt-text {
    font-family: 'SF Mono', Menlo, monospace;
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.5;
    white-space: pre-wrap;
  }

  /* ===== FLOW ANIMATION ===== */
  @keyframes flowPulse {
    0%, 100% { stroke-opacity: 0.25; }
    50% { stroke-opacity: 0.7; }
  }
  .flow-pulse { animation: flowPulse 2s ease-in-out infinite; }

  @keyframes dashMove { to { stroke-dashoffset: -24; } }
  .dash-animate { animation: dashMove 0.8s linear infinite; }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-scroll">
    <div class="sidebar-header">
      <h1>V1 Tool Stack</h1>
      <p>Glytec AI SDR &mdash; Interactive Map</p>
    </div>

    <div class="sidebar-section">
      <h3>Views</h3>
      <button class="preset-btn active" data-preset="full">Full System</button>
      <button class="preset-btn" data-preset="outbound">Outbound Flow</button>
      <button class="preset-btn" data-preset="enrichment">Enrichment Pipeline</button>
      <button class="preset-btn" data-preset="intelligence">Intelligence Loop</button>
      <button class="preset-btn" data-preset="ai-agent">AI Agent Steps</button>
      <button class="preset-btn" data-preset="compliance">Compliance &amp; Safety</button>
    </div>

    <div class="sidebar-section">
      <h3>Layers</h3>
      <div id="layer-toggles"></div>
    </div>

    <div class="sidebar-section">
      <h3>Connection Types</h3>
      <div id="conn-toggles"></div>
    </div>

    <div class="notes-section">
      <h3>Notes (<span id="note-count">0</span>)</h3>
      <div id="notes-list"><div class="notes-empty">Click any node to add notes</div></div>
    </div>
  </div>
</div>

<div class="main">
  <div class="canvas-wrap">
    <svg id="canvas" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arr-blue" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0, 7 2.5, 0 5" fill="#3b82f6"/></marker>
        <marker id="arr-green" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0, 7 2.5, 0 5" fill="#10b981"/></marker>
        <marker id="arr-red" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0, 7 2.5, 0 5" fill="#ef4444"/></marker>
        <marker id="arr-purple" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0, 7 2.5, 0 5" fill="#a855f7"/></marker>
        <marker id="arr-orange" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0, 7 2.5, 0 5" fill="#f97316"/></marker>
        <marker id="arr-pink" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0, 7 2.5, 0 5" fill="#ec4899"/></marker>
        <marker id="arr-cyan" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0, 7 2.5, 0 5" fill="#06b6d4"/></marker>
      </defs>
    </svg>
    <div class="zoom-controls">
      <button class="zoom-btn" onclick="zoomIn()">+</button>
      <button class="zoom-btn" onclick="zoomOut()">&minus;</button>
      <button class="zoom-btn" onclick="zoomFit()" style="font-size:10px">Fit</button>
    </div>
    <div class="detail-panel" id="detail-panel">
      <div class="detail-header">
        <div><h2 id="detail-title"></h2><span class="badge" id="detail-badge"></span></div>
        <button class="detail-close" onclick="closeDetail()">&times;</button>
      </div>
      <div class="detail-body" id="detail-body"></div>
      <div class="detail-note-area">
        <textarea id="detail-note" placeholder="Add a note about this component..."></textarea>
        <button onclick="saveNote()">Save Note</button>
      </div>
    </div>
  </div>

  <div class="prompt-bar" id="prompt-bar">
    <div class="prompt-bar-header" onclick="togglePromptBar()">
      <h3>Prompt Output</h3>
      <div class="controls">
        <button class="copy-btn" id="copy-btn" onclick="event.stopPropagation(); copyPrompt()">Copy</button>
        <button class="prompt-toggle" id="prompt-toggle">&#x25BC;</button>
      </div>
    </div>
    <div class="prompt-content" id="prompt-content">
      <div class="prompt-text" id="prompt-output"></div>
    </div>
  </div>
</div>

function buildSidebar() {
  // Layers
  const lt = document.getElementById('layer-toggles');
  lt.innerHTML = '';
  Object.entries(LAYERS).forEach(([k, v]) => {
    const row = document.createElement('label');
    row.className = 'toggle-row';
    row.innerHTML = `<input type="checkbox" ${state.layers[k] ? 'checked' : ''} data-layer="${k}">
      <span class="toggle-dot" style="background:${v.color}"></span>${v.label}`;
    row.querySelector('input').addEventListener('change', e => {
      state.layers[k] = e.target.checked;
      state.activePreset = null;
      updatePresetBtns();
      render();
    });
    lt.appendChild(row);
  });

  // Connections
  const ct = document.getElementById('conn-toggles');
  ct.innerHTML = '';
  Object.entries(CONN_TYPES).forEach(([k, v]) => {
    const row = document.createElement('label');
    row.className = 'toggle-row';
    const dStyle = v.dash ? `stroke-dasharray:${v.dash}` : '';
    row.innerHTML = `<input type="checkbox" ${state.conns[k] ? 'checked' : ''} data-conn="${k}">
      <svg width="20" height="4" style="flex-shrink:0"><line x1="0" y1="2" x2="20" y2="2" stroke="${v.color}" stroke-width="2" style="${dStyle}"/></svg>
      <span style="color:${v.color}">${v.label}</span>`;
    row.querySelector('input').addEventListener('change', e => {
      state.conns[k] = e.target.checked;
      render();
    });
    ct.appendChild(row);
  });
}

function updatePresetBtns() {
  document.querySelectorAll('.preset-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.preset === state.activePreset);
  });
}

function applyPreset(name) {
  const p = PRESETS[name];
  if (!p) return;
  state.activePreset = name;
  Object.keys(LAYERS).forEach(k => state.layers[k] = p.layers.includes(k));
  Object.keys(CONN_TYPES).forEach(k => state.conns[k] = p.conns.includes(k));
  state.highlight = p.highlight || [];
  buildSidebar();
  updatePresetBtns();
  render();
}

function render() {
  // Remove old world
  const old = document.getElementById('world');
  if (old) old.remove();

  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  g.id = 'world';
  g.setAttribute('transform', `translate(${state.panX},${state.panY}) scale(${state.zoom})`);

  // --- ZONES (background regions) ---
  ZONES.forEach(z => {
    const rect = make('rect', { x: z.x, y: z.y, width: z.w, height: z.h, rx: 16, fill: z.color, 'fill-opacity': 0.04, stroke: z.color, 'stroke-opacity': 0.12, 'stroke-width': 1, 'stroke-dasharray': '6,4' });
    g.appendChild(rect);

    const label = make('text', { x: z.x + 14, y: z.y + 22, 'font-size': 10, 'font-weight': 700, fill: z.color, opacity: 0.5, 'letter-spacing': '1.5px' });
    label.textContent = z.label;
    g.appendChild(label);

    if (z.sublabel) {
      const sub = make('text', { x: z.x + 14, y: z.y + 36, 'font-size': 9, fill: z.color, opacity: 0.3 });
      sub.textContent = z.sublabel;
      g.appendChild(sub);
    }
  });

  // --- CONNECTIONS ---
  connections.forEach(conn => {
    if (!state.conns[conn.type]) return;
    const fromN = nodes.find(n => n.id === conn.from);
    const toN = nodes.find(n => n.id === conn.to);
    if (!fromN || !toN) return;
    if (!state.layers[fromN.layer] || !state.layers[toN.layer]) return;

    const ct = CONN_TYPES[conn.type];
    const pts = connPoints(fromN, toN);
    const hl = state.highlight.length === 0 || (state.highlight.includes(conn.from) && state.highlight.includes(conn.to));

    // Path
    const dx = pts.x2 - pts.x1;
    const dy = pts.y2 - pts.y1;
    let d;
    if (Math.abs(dx) > Math.abs(dy) * 0.6) {
      // Horizontal-ish: S-curve
      const cx = dx * 0.45;
      d = `M${pts.x1},${pts.y1} C${pts.x1 + cx},${pts.y1} ${pts.x2 - cx},${pts.y2} ${pts.x2},${pts.y2}`;
    } else {
      // Vertical-ish
      const cy = dy * 0.45;
      d = `M${pts.x1},${pts.y1} C${pts.x1},${pts.y1 + cy} ${pts.x2},${pts.y2 - cy} ${pts.x2},${pts.y2}`;
    }

    const path = make('path', {
      d, fill: 'none', stroke: ct.color, 'stroke-width': 1.5,
      'stroke-opacity': hl ? 0.45 : 0.08,
      'marker-end': `url(#arr-${colorName(ct.color)})`
    });
    if (ct.dash) path.setAttribute('stroke-dasharray', ct.dash);
    g.appendChild(path);

    // Label on connection
    if (conn.label && hl) {
      const mx = (pts.x1 + pts.x2) / 2;
      const my = (pts.y1 + pts.y2) / 2;
      // offset label perpendicular to the line
      const angle = Math.atan2(dy, dx);
      const off = -10;
      const lx = mx + Math.sin(angle) * off;
      const ly = my - Math.cos(angle) * off;

      const bg = make('rect', { x: lx - 2, y: ly - 8, width: conn.label.length * 4.5 + 8, height: 12, rx: 3, fill: '#0f1117', 'fill-opacity': 0.8 });
      g.appendChild(bg);

      const txt = make('text', { x: lx + 2, y: ly, 'font-size': 7.5, fill: ct.color, opacity: 0.7 });
      txt.textContent = conn.label;
      g.appendChild(txt);
    }
  });

  // --- NODES ---
  nodes.forEach(node => {
    if (!state.layers[node.layer]) return;

    const layerColor = LAYERS[node.layer].color;
    const hl = state.highlight.length === 0 || state.highlight.includes(node.id);
    const hasNote = state.notes.some(n => n.target === node.id);
    const isSel = state.selectedNode === node.id;

    const ng = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    ng.setAttribute('opacity', hl ? 1 : 0.15);
    ng.style.cursor = 'pointer';

    // Shadow
    ng.appendChild(make('rect', { x: node.x + 2, y: node.y + 2, width: node.w, height: node.h, rx: 8, fill: 'rgba(0,0,0,0.35)' }));

    // Body
    const strokeColor = isSel ? '#fff' : hasNote ? '#eab308' : layerColor;
    const strokeW = isSel ? 2.5 : hasNote ? 2 : 1.2;
    ng.appendChild(make('rect', { x: node.x, y: node.y, width: node.w, height: node.h, rx: 8, fill: '#181b24', stroke: strokeColor, 'stroke-width': strokeW }));

    // Left accent
    ng.appendChild(make('rect', { x: node.x, y: node.y + 6, width: 3, height: node.h - 12, rx: 1.5, fill: layerColor }));

    // Status dot
    if (node.detail?.statusColor) {
      ng.appendChild(make('circle', { cx: node.x + node.w - 14, cy: node.y + 14, r: 4, fill: node.detail.statusColor }));
    }

    // Label
    const lbl = make('text', { x: node.x + 14, y: node.y + 22, 'font-size': 12, 'font-weight': 600, fill: '#e2e4ed' });
    lbl.textContent = node.label;
    ng.appendChild(lbl);

    // Subtitle
    const sub = make('text', { x: node.x + 14, y: node.y + 38, 'font-size': 9, fill: '#6b7080' });
    sub.textContent = node.subtitle;
    ng.appendChild(sub);

    // Note icon
    if (hasNote) {
      const ni = make('text', { x: node.x + node.w - 16, y: node.y + node.h - 8, 'font-size': 10, fill: '#eab308' });
      ni.textContent = '\u270E';
      ng.appendChild(ni);
    }

    ng.addEventListener('click', e => { e.stopPropagation(); openDetail(node); });
    ng.addEventListener('mouseenter', () => { ng.querySelector('rect:nth-child(2)').setAttribute('stroke-width', '2.5'); });
    ng.addEventListener('mouseleave', () => { ng.querySelector('rect:nth-child(2)').setAttribute('stroke-width', strokeW); });

    g.appendChild(ng);
  });

  svg.appendChild(g);
  updatePrompt();
}

function make(tag, attrs) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
  return el;
}

function connPoints(from, to) {
  const fc = { x: from.x + from.w / 2, y: from.y + from.h / 2 };
  const tc = { x: to.x + to.w / 2, y: to.y + to.h / 2 };
  const dx = tc.x - fc.x, dy = tc.y - fc.y;

  if (Math.abs(dx) > Math.abs(dy)) {
    return dx > 0
      ? { x1: from.x + from.w, y1: fc.y, x2: to.x, y2: tc.y }
      : { x1: from.x, y1: fc.y, x2: to.x + to.w, y2: tc.y };
  }
  return dy > 0
    ? { x1: fc.x, y1: from.y + from.h, x2: tc.x, y2: to.y }
    : { x1: fc.x, y1: from.y, x2: tc.x, y2: to.y + to.h };
}

function colorName(hex) {
  return { '#3b82f6':'blue', '#10b981':'green', '#ef4444':'red', '#a855f7':'purple', '#f97316':'orange', '#06b6d4':'cyan', '#ec4899':'pink' }[hex] || 'blue';
}

function openDetail(node) {
  state.selectedNode = node.id;
  document.getElementById('detail-title').textContent = `${node.label}`;
  const badge = document.getElementById('detail-badge');
  if (node.detail) {
    badge.textContent = node.detail.status;
    badge.style.background = node.detail.statusColor + '20';
    badge.style.color = node.detail.statusColor;
    badge.style.display = 'inline-block';

    let html = `<p>${node.detail.desc}</p>`;
    if (node.detail.sections) {
      Object.entries(node.detail.sections).forEach(([h, items]) => {
        html += `<h4>${h}</h4><ul>${items.map(i => `<li>${i}</li>`).join('')}</ul>`;
      });
    }
    document.getElementById('detail-body').innerHTML = html;
  } else {
    badge.style.display = 'none';
    document.getElementById('detail-body').innerHTML = '';
  }

  const existing = state.notes.find(n => n.target === node.id);
  document.getElementById('detail-note').value = existing ? existing.text : '';
  document.getElementById('detail-panel').classList.add('open');
  render();
}

function closeDetail() {
  state.selectedNode = null;
  document.getElementById('detail-panel').classList.remove('open');
  render();
}

function saveNote() {
  if (!state.selectedNode) return;
  const text = document.getElementById('detail-note').value.trim();
  if (!text) return;
  const node = nodes.find(n => n.id === state.selectedNode);
  const idx = state.notes.findIndex(n => n.target === state.selectedNode);
  if (idx >= 0) state.notes[idx].text = text;
  else state.notes.push({ id: Date.now(), target: state.selectedNode, label: node.label, subtitle: node.subtitle, text });
  renderNotes();
  render();
}

function renderNotes() {
  const list = document.getElementById('notes-list');
  document.getElementById('note-count').textContent = state.notes.length;
  if (state.notes.length === 0) {
    list.innerHTML = '<div class="notes-empty">Click any node to add notes</div>';
    updatePrompt();
    return;
  }
  list.innerHTML = '';
  state.notes.forEach(n => {
    const div = document.createElement('div');
    div.className = 'note-item';
    div.innerHTML = `<span class="target">${n.label}</span><div class="text">${n.text}</div><button class="delete-btn" data-id="${n.id}">&times;</button>`;
    div.querySelector('.delete-btn').addEventListener('click', () => {
      state.notes = state.notes.filter(x => x.id !== n.id);
      renderNotes();
      render();
    });
    list.appendChild(div);
  });
  updatePrompt();
}

  const parts = [];
  const activeLayers = Object.entries(state.layers).filter(([, v]) => v).map(([k]) => LAYERS[k].label);
  const preset = state.activePreset ? document.querySelector(`[data-preset="${state.activePreset}"]`)?.textContent : 'Custom';

  parts.push(`Glytec AI SDR v1 tool stack \u2014 ${preset} view.`);
  parts.push(`Layers: ${activeLayers.join(', ')}.`);

  const notConn = nodes.filter(n => n.detail?.status === 'NOT CONNECTED' && state.layers[n.layer]);
  const defined = nodes.filter(n => n.detail?.status?.includes('defined') && state.layers[n.layer]);
  if (notConn.length) parts.push(`\nBlocking: ${notConn.map(n => n.label).join(', ')}.`);
  if (defined.length) parts.push(`Needs build: ${defined.map(n => n.label).join(', ')}.`);

  if (state.notes.length) {
    parts.push('\nComponent notes:');
    state.notes.forEach(n => parts.push(`\n${n.label} (${n.subtitle}):\n${n.text}`));
  }

  document.getElementById('prompt-output').textContent = parts.join('\n');
}

function copyPrompt() {
  const text = document.getElementById('prompt-output').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1200);
  });
}

function togglePromptBar() {
  state.promptCollapsed = !state.promptCollapsed;
  document.getElementById('prompt-bar').classList.toggle('collapsed', state.promptCollapsed);
  document.getElementById('prompt-toggle').innerHTML = state.promptCollapsed ? '&#x25B2;' : '&#x25BC;';
}

// ==================== ZOOM & PAN ====================

function zoomIn() { state.zoom = Math.min(state.zoom * 1.2, 3); render(); }
function zoomOut() { state.zoom = Math.max(state.zoom / 1.2, 0.25); render(); }
function zoomFit() { state.zoom = 0.72; state.panX = 30; state.panY = 10; render(); }

svg.addEventListener('mousedown', e => {
  if (e.target === svg || e.target.closest('#world') && !e.target.closest('g[opacity]')) {
    panning = true;
    panStart = { x: e.clientX - state.panX, y: e.clientY - state.panY };
    svg.style.cursor = 'grabbing';
  }
});
svg.addEventListener('mousemove', e => {
  if (!panning) return;
  state.panX = e.clientX - panStart.x;
  state.panY = e.clientY - panStart.y;
  const w = document.getElementById('world');
  if (w) w.setAttribute('transform', `translate(${state.panX},${state.panY}) scale(${state.zoom})`);
});
svg.addEventListener('mouseup', () => { panning = false; svg.style.cursor = 'grab'; });
svg.addEventListener('mouseleave', () => { panning = false; svg.style.cursor = 'grab'; });
svg.addEventListener('wheel', e => {
  e.preventDefault();
  state.zoom = Math.max(0.25, Math.min(3, state.zoom * (e.deltaY > 0 ? 0.94 : 1.06)));
  render();
}, { passive: false });
svg.addEventListener('click', e => {
  if (e.target === svg) closeDetail();
});

// ==================== PRESET BUTTONS ====================

document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.addEventListener('click', () => applyPreset(btn.dataset.preset));
});

// ==================== INIT ====================

buildSidebar();
zoomFit();
</script>
</body>
</html>
